  <link rel="preconnect" href="https://res.cloudinary.com">

  <title>LeadDistro | Distribución inteligente de leads para HubSpot, GHL y monday</title>

    content="Optimiza la asignación de leads en HubSpot, GoHighLevel y monday.com con LeadDistro. Configura límites por vendedor, equipos por porcentaje y automatiza tu flujo de ventas. 7 días gratis." />

  <meta name="robots" content="index, follow" />
  <script>
    // Initialize dark mode before page renders to prevent flash
    (function () {
      const savedDarkMode = localStorage.getItem('darkMode');
      const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const isDark = savedDarkMode ? savedDarkMode === 'true' : systemPrefersDark;
      if (isDark) {
        document.documentElement.classList.add('dark');
        document.documentElement.style.colorScheme = 'dark';
      } else {
        document.documentElement.style.colorScheme = 'light';
      }
    })();
  </script>


  <!-- Google tag (gtag.js) - Deferred loading -->
  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        const script = document.createElement('script');
        script.src = "https://www.googletagmanager.com/gtag/js?id=G-GXBJE7ZV0W";
        script.async = true;
        document.head.appendChild(script);

        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-GXBJE7ZV0W');
      }, 3500); // 3.5s delay to allow LCP and interactive states to stabilize
    });
  </script>
</head>
